name: Build images
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5' # Run every friday at midnight

env:
  KERNEL_BRANCH: 6.12.1

jobs:
  build-image:
    strategy:
      matrix:
        version: ["default"]

    runs-on: ubuntu-latest
    steps:
      - name: Check out build configurations
        uses: actions/checkout@v4

      - name: Substitute placeholders in configs
        run: |
          find . -type f -name "*.cfg" -exec sed -i "s|HOME|$(echo $HOME)|;s|NPROC|$(nproc)|" {} +

      - name: Install pmbootstrap from git
        run: |
          set -euo pipefail
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -sf "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          pmbootstrap --version

      - name: Set up pmaports
        run: |
          set -euo pipefail
          echo -e '\n\nedge\nfairphone\nfp4\n\n\nphosh\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' | pmbootstrap init || true
          cd ~/.local/var/pmbootstrap/cache_git/pmaports
          if git remote get-url sm8150 >/dev/null 2>&1; then
            git remote set-url sm8150 https://github.com/sm8150-linux-mainline/pmaports.git
          else
            git remote add sm8150 https://github.com/sm8150-linux-mainline/pmaports.git
          fi
          DEFAULT_BRANCH=$(git ls-remote --symref sm8150 HEAD | awk '/^ref:/ {sub("refs/heads/", "", $2); print $2}')
          DEFAULT_BRANCH=${DEFAULT_BRANCH:-next}
          git fetch --depth=1 sm8150 "$DEFAULT_BRANCH"
          if git cat-file -e "sm8150/$DEFAULT_BRANCH:main/adbd-linux/APKBUILD" 2>/dev/null; then
            git checkout "sm8150/$DEFAULT_BRANCH" -- main/adbd-linux
          else
            git fetch --depth=1 sm8150 next
            git checkout sm8150/next -- main/adbd-linux
          fi

      - name: Check kernel branch
        if: matrix.version == 'default'
        run: |
          set -euo pipefail
          DEFAULT_BRANCH=$(curl -fsSL https://api.github.com/repos/sm8150-mainline/linux | jq -r '.default_branch // empty')
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH="${KERNEL_BRANCH}"
          fi
          echo "Default branch is $DEFAULT_BRANCH"
          echo "KERNEL_BRANCH=$DEFAULT_BRANCH" >> $GITHUB_ENV

      - name: Clone kernel sources
        run: |
          #git clone https://github.com/sm8150-mainline/linux.git --single-branch --branch ${{ env.KERNEL_BRANCH }} --depth 1 ./linux

      - name: Choose any SM8150 device in pmbootstrap to build kernel
        run: |
          cp xiaomi-raphael.cfg ~/.config/pmbootstrap_v3.cfg

      - name: Compile kernel with envkernel
        run: |
          #cd linux
          #shopt -s expand_aliases
          #source ../pmbootstrap/helpers/envkernel.sh
          #make defconfig sm8150.config
          #make -j$(nproc)
          #pmbootstrap build --envkernel linux-postmarketos-qcom-sm8150

      - name: Create artifact directory
        run: |
          mkdir out

      - name: Build xiaomi-raphael
        run: |
          cp xiaomi-raphael.cfg ~/.config/pmbootstrap_v3.cfg
          pmbootstrap build adbd-linux
          pmbootstrap config extra_packages adbd-linux
          pmbootstrap install --password 147147 --split
          pmbootstrap export
          ls /tmp/postmarketOS-export/ -la
          cp /tmp/postmarketOS-export/boot.img out/boot-xiaomi-raphael.img

          # for case without "--split", the resulting file is xiaomi.img
          cp /tmp/postmarketOS-export/*raphael*.img out/ || true

          # for case with split, the result file is xiaomi-root.img
          cp /tmp/postmarketOS-export/*raphael-*.img out/ || true
          
          #sed -i 's/tianma/huaxing/g' ~/.config/pmbootstrap_v3.cfg
          #pmbootstrap export
          #cp /tmp/postmarketOS-export/boot.img out/boot-xiaomi-huaxing-raphael.img
          #xz -T0 -9e -v out/xiaomi-raphael*.img
          echo -e "n\nn\ny\n" | pmbootstrap zap

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaomi-raphael-${{ env.KERNEL_BRANCH }}
          path: out/*-raphael*.img*
          retention-days: 7
